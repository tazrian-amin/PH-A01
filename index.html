<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dev Conference 2026</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Arimo:wght@500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <nav>
        <div>
          <img class="logo" src="./assets/logo.png" alt="dev conference logo" />
        </div>

        <ul class="nav-links">
          <li>
            <a href="#speakers">Speakers</a>
          </li>
          <li>
            <a href="#">Schedule</a>
          </li>
          <li>
            <a href="#">Tracks</a>
          </li>
          <li>
            <a href="#">Venue</a>
          </li>
          <li>
            <a href="#">Blog</a>
          </li>
        </ul>

        <button class="primary-btn">Register Now</button>
      </nav>
    </header>

    <main>
      <section class="banner">
        <h1>Code. <em>Connect.</em> Create</h1>
        <p>
          Join 4,000+ engineers, founders, and builders at the premier
          developer<br />conference of 2026. Three days of cutting-edge talks,
          hands-on workshops,<br />and meaningful connections.
        </p>
        <button class="primary-btn">Register Now</button>
      </section>
      
      <section id="speakers" class="speakers"></section>
      <section class="pricing"></section>
      <section class="ai-section"></section>
    </main>

    <footer>
      <div class="news-letter"></div>
      <div class="quick-links"></div>
    </footer>
